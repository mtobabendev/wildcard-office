<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>PENNY'S OFFICE</title> <style> * { box-sizing: border-box; }
html {
  min-height: 100%;
  background: #000000;
}

body {
  min-height: 100vh;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  background: radial-gradient(circle at center, #120d1c 0%, #050507 55%, #000000 100%);
  color: #f6f3ff;
  font-family: Arial, Helvetica, sans-serif;
  line-height: 1.5;
}

main {
  width: 100%;
  max-width: 26rem;
}

.card {
  width: 100%;
  padding: 2rem;
  border: 1px solid #7c3cff;
  border-radius: 1rem;
  background: #08070d;
  box-shadow: 0 0 2.5rem rgba(124, 60, 255, 0.18);
}

header {
  text-align: center;
}

h1 {
  margin: 0;
  color: #ffffff;
  font-size: 1.75rem;
  line-height: 1.2;
  letter-spacing: 0.12em;
}

.system {
  margin: 0.75rem 0 0;
  color: #e7e2f4;
  font-size: 0.95rem;
}

.status {
  margin: 1.25rem 0 1.75rem;
  padding: 0.75rem;
  border: 1px solid rgba(255, 121, 200, 0.5);
  border-radius: 0.75rem;
  color: #ff79c8;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-align: center;
}

form {
  display: grid;
  gap: 1rem;
}

label {
  display: block;
  margin: 0 0 0.4rem;
  color: #f6f3ff;
  font-size: 0.9rem;
  font-weight: 700;
}

input {
  width: 100%;
  min-height: 3rem;
  padding: 0.75rem 0.85rem;
  border: 1px solid rgba(124, 60, 255, 0.75);
  border-radius: 0.65rem;
  background: #000000;
  color: #ffffff;
  font: inherit;
}

input:focus {
  border-color: #ff79c8;
  outline: 3px solid rgba(255, 121, 200, 0.35);
  outline-offset: 2px;
}

button {
  min-height: 3rem;
  margin-top: 0.25rem;
  border: 1px solid #9d73ff;
  border-radius: 0.65rem;
  background: #6f35e8;
  color: #ffffff;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
}

button:focus {
  outline: 3px solid rgba(255, 121, 200, 0.45);
  outline-offset: 2px;
}

.message {
  margin: 1.5rem 0 0;
  color: #e7e2f4;
  font-size: 0.9rem;
  text-align: center;
}

.message + .message {
  margin-top: 0.5rem;
}

@media (max-width: 30rem) {
  body {
    padding: 1rem;
  }

  .card {
    padding: 1.5rem;
  }

  h1 {
    font-size: 1.35rem;
  }
}
</style> </head> <body> <main> <section class="card" aria-labelledby="page-title"> <header> <h1 id="page-title">PENNY'S OFFICE</h1> <p class="system">WildCard Dev Internal Systems</p> </header>
  <p class="status">AUTHORIZED ACCESS ONLY</p>

  <form action="#" method="post">
    <div>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required autocomplete="username">
    </div>

    <div>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">
    </div>

    <button type="submit">Sign In</button>
  </form>

  <p class="message">Office systems initializing...</p>
  <p class="message">Access requires authorization.</p>
</section>
</main> </body> </html>
